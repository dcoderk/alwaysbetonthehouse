<header class="wp-block-group site-header" id="top">
	<!-- wp:group {"className":"header-row","layout":{"type":"flex","justifyContent":"space-between","verticalAlignment":"center","flexWrap":"nowrap"}} -->
	<div class="wp-block-group header-row">
		<!-- wp:shortcode -->
		[property_listings_header_title]
		<!-- /wp:shortcode -->

		<!-- wp:group {"className":"site-nav-tools","layout":{"type":"flex","verticalAlignment":"center","flexWrap":"nowrap","justifyContent":"right"}} -->
		<div class="wp-block-group site-nav-tools">
			<!-- wp:social-links {"className":"social-list is-style-logos-only","iconColor":"contrast","iconColorValue":"#111111","openInNewTab":true,"size":"has-small-icon-size","layout":{"type":"flex","flexWrap":"nowrap"}} -->
			<ul class="wp-block-social-links social-list has-small-icon-size has-icon-color is-style-logos-only">
				<!-- wp:social-link {"url":"#","service":"x"} /-->
				<!-- wp:social-link {"url":"#","service":"instagram"} /-->
				<!-- wp:social-link {"url":"#","service":"tiktok"} /-->
				<!-- wp:social-link {"url":"#","service":"linkedin"} /-->
			</ul>
			<!-- /wp:social-links -->

			<!-- wp:group {"className":"search-pill-wrap","layout":{"type":"default"}} -->
			<div class="wp-block-group search-pill-wrap">
				<!-- wp:html -->
				<div class="header-search" data-header-search>
					<button class="header-search__toggle" id="searchToggle" type="button" aria-expanded="false" aria-controls="searchPanel">
						<span>Search</span>
					</button>
				</div>
				<!-- /wp:html -->
			</div>
			<!-- /wp:group -->

			<!-- wp:navigation {"overlayMenu":"mobile","className":"site-nav","layout":{"type":"flex","justifyContent":"right"}} /-->
		</div>
		<!-- /wp:group -->
	</div>
	<!-- /wp:group -->

	<!-- wp:html -->
	<div class="search-panel" id="searchPanel" hidden>
		<div class="search-wrap">
			<form class="header-search__form" role="search" method="get" action="/">
				<label class="screen-reader-text" for="header-search-input">Search the site</label>
				<input id="header-search-input" class="header-search__input" type="search" name="s" placeholder="Search episodes, homes, or agents" />
				<button class="header-search__submit" type="submit">Go</button>
			</form>
		</div>
	</div>
	<!-- /wp:html -->
